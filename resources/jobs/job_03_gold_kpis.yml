resources:
  jobs:
    adms_03_gold_kpis:
      name: "[ADMS] 03 — Gold KPIs"
      description: >
        Calcula os KPIs regulatórios e índices de gestão da rede:
        DEC/FEC ANEEL, saúde de ativos e perdas comerciais.
        Roda em paralelo após Silver concluir.

      tags:
        projeto: adms-smart-grid
        camada: gold
        equipe: data-engineering

      job_clusters:
        - job_cluster_key: gold_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: Standard_DS3_v2
            num_workers: 2
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
              spark.sql.shuffle.partitions: "8"
            data_security_mode: SINGLE_USER

      tasks:
        - task_key: gold_dec_fec
          description: "Silver → Gold kpi_dec_fec_mensal (ANEEL)"
          job_cluster_key: gold_cluster
          notebook_task:
            notebook_path: ${var.notebook_path}/gold/notebooks/05_gold_kpi_dec_fec
            base_parameters:
              catalog: ${var.catalog}
          timeout_seconds: 600
          max_retries: 1

        - task_key: gold_saude_ativos
          description: "Silver → Gold saude_ativo_alimentador"
          depends_on:
            - task_key: gold_dec_fec
          job_cluster_key: gold_cluster
          notebook_task:
            notebook_path: ${var.notebook_path}/gold/notebooks/06_gold_saude_ativos
            base_parameters:
              catalog: ${var.catalog}
          timeout_seconds: 600
          max_retries: 1

        - task_key: gold_perdas_comerciais
          description: "Silver → Gold perdas_comerciais_regional"
          depends_on:
            - task_key: gold_dec_fec
          job_cluster_key: gold_cluster
          notebook_task:
            notebook_path: ${var.notebook_path}/gold/notebooks/07_gold_perdas_comerciais
            base_parameters:
              catalog: ${var.catalog}
          timeout_seconds: 600
          max_retries: 1

      queue:
        enabled: true

      max_concurrent_runs: 1
